<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#353B56"/>

  <!-- Soft glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#FBB45E" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#353B56" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>

  <!-- Journal / book body -->
  <rect x="130" y="110" width="252" height="300" rx="12" fill="#F5EFE8"/>
  <!-- Spine -->
  <rect x="130" y="110" width="36" height="300" rx="8" fill="#C99379"/>
  <!-- Spine shadow -->
  <rect x="155" y="110" width="11" height="300" fill="#B8856A" opacity="0.5"/>

  <!-- Page lines -->
  <line x1="196" y1="175" x2="358" y2="175" stroke="#7D7585" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="196" y1="205" x2="358" y2="205" stroke="#7D7585" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <line x1="196" y1="235" x2="340" y2="235" stroke="#7D7585" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <line x1="196" y1="265" x2="358" y2="265" stroke="#7D7585" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  <line x1="196" y1="295" x2="320" y2="295" stroke="#7D7585" stroke-width="3" stroke-linecap="round" opacity="0.2"/>

  <!-- Sun / circle accent top right of page -->
  <circle cx="340" cy="148" r="22" fill="none" stroke="#FBB45E" stroke-width="4" opacity="0.9"/>
  <circle cx="340" cy="148" r="10" fill="#FBB45E" opacity="0.7"/>

  <!-- Pen / feather -->
  <g transform="rotate(-35, 370, 360)">
    <rect x="355" y="290" width="9" height="70" rx="4" fill="#FBB45E"/>
    <polygon points="359.5,290 351,310 368,310" fill="#C99379"/>
    <rect x="356" y="355" width="7" height="14" rx="2" fill="#251211" opacity="0.6"/>
    <line x1="359.5" y1="360" x2="359.5" y2="370" stroke="#F5EFE8" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Small stars / dots -->
  <circle cx="176" cy="390" r="4" fill="#FBB45E" opacity="0.6"/>
  <circle cx="380" cy="130" r="3" fill="#FBB45E" opacity="0.4"/>
  <circle cx="95" cy="200" r="5" fill="#FBB45E" opacity="0.25"/>
  <circle cx="420" cy="380" r="4" fill="#C99379" opacity="0.35"/>
</svg>
